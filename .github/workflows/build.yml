name: Build & Release VoiceInk

on:
  schedule:
    - cron: "0 10 * * 1"  # Every Monday at 10:00 UTC
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Skip whisper.xcframework cache"
        type: boolean
        default: false
      force_rebuild:
        description: "Force a re-release of the current upstream SHA (appends -rN suffix to tag)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  UPSTREAM_REPO: Beingpax/VoiceInk
  UPSTREAM_URL: https://github.com/Beingpax/VoiceInk.git
  SPARKLE_PUBLIC_KEY: "22HdaJksDsRyOwfyMqARsF0on0MXQdfmCSeGTk+EaCU="

jobs:
  # ── Determine version and check if already released ──────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      build_number: ${{ steps.info.outputs.build_number }}
      tag: ${{ steps.info.outputs.tag }}
      upstream_sha: ${{ steps.info.outputs.upstream_sha }}
      upstream_sha_short: ${{ steps.info.outputs.upstream_sha_short }}
      already_released: ${{ steps.info.outputs.already_released }}
    steps:
      - name: Fetch upstream and determine version
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 "$UPSTREAM_URL" upstream-src
          cd upstream-src

          UPSTREAM_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA_SHORT=$(git rev-parse --short HEAD)
          VERSION=$(grep 'MARKETING_VERSION' VoiceInk.xcodeproj/project.pbxproj \
            | head -1 | grep -oE '[0-9]+\.[0-9]+[0-9.]*')
          PROJECT_VERSION=$(grep 'CURRENT_PROJECT_VERSION' VoiceInk.xcodeproj/project.pbxproj \
            | head -1 | grep -oE '[0-9]+')
          BASE_TAG="v${VERSION}-${UPSTREAM_SHA_SHORT}-patched"
          TAG="$BASE_TAG"
          FORCE_REBUILD="${{ inputs.force_rebuild }}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            if [ "$FORCE_REBUILD" = "true" ]; then
              # Find next available -rN suffix so the new release gets its own
              # tag and release page (Sparkle CFBundleVersion increments via
              # BUILD_NUMBER below, so installed clients still see it as newer).
              SUFFIX=2
              while gh release view "${BASE_TAG}-r${SUFFIX}" --repo "$GITHUB_REPOSITORY" &>/dev/null; do
                SUFFIX=$((SUFFIX + 1))
              done
              TAG="${BASE_TAG}-r${SUFFIX}"
              echo "already_released=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Force rebuild requested — using new tag $TAG"
            else
              echo "already_released=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Release $BASE_TAG already exists, skipping (use workflow_dispatch with force_rebuild=true to re-release)"
            fi
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
          fi

          # List matching release tags up front (--paginate streams each page's
          # tags; they concatenate one-per-line). Fail loudly if the API call
          # breaks so a transient error can't silently reset the sequence to 1.
          MATCHED_TAGS=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            --jq ".[] | select(.tag_name | test(\"^v${VERSION}-.*-patched(-r[0-9]+)?$\")) | .tag_name") \
            || { echo "::error::Failed to list releases for version counting"; exit 1; }

          # Count existing patched releases for this MARKETING_VERSION so repeated
          # builds against the same upstream version get monotonically increasing
          # CFBundleVersion / sparkle:version values (201.1, 201.2, ...). Sparkle
          # compares segment-by-segment, so [201, N+1] always wins over [201, N].
          # The regex matches bare `-patched` and `-patched-rN` so re-releases also
          # bump the count. NB: keep the dot unescaped -- a jq string literal
          # rejects "\." (invalid escape), which silently pinned every build to N.1.
          EXISTING_COUNT=$(printf '%s' "$MATCHED_TAGS" | grep -c '^v' || true)
          SEQ=$((EXISTING_COUNT + 1))
          BUILD_NUMBER="${PROJECT_VERSION}.${SEQ}"

          echo "version=$VERSION"               >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER"      >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                        >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA"      >> "$GITHUB_OUTPUT"
          echo "upstream_sha_short=$UPSTREAM_SHA_SHORT" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION | Build: $BUILD_NUMBER (seq $SEQ) | Tag: $TAG | Upstream: $UPSTREAM_SHA_SHORT"

  # ── Build for each architecture ──────────────────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.already_released != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
            arch_name: Apple-Silicon
          - runner: macos-26
            arch: x86_64
            arch_name: Intel
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
      TAG: ${{ needs.prepare.outputs.tag }}
      UPSTREAM_SHA_SHORT: ${{ needs.prepare.outputs.upstream_sha_short }}
      HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
      LOCAL_DERIVED_DATA: .local-build
    steps:
      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$LATEST_XCODE"
          echo "Using $(xcodebuild -version | head -1)"

      - name: Checkout upstream VoiceInk
        uses: actions/checkout@v4
        with:
          repository: Beingpax/VoiceInk
          ref: main

      - name: Checkout fork patches (supplemental Swift sources)
        uses: actions/checkout@v4
        with:
          path: fork-tools
          sparse-checkout: |
            patches

      # ── Apply all patches (single source of truth: fork-tools/patches/apply.py) ─
      - name: Apply fork patches
        env:
          APPCAST_LINK: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml
        run: python3 fork-tools/patches/apply.py

      # ── Build whisper.xcframework ────────────────────────────────────────────
      - name: Cache whisper.xcframework
        if: ${{ !inputs.skip_cache }}
        uses: actions/cache@v4
        id: whisper-cache
        with:
          path: ~/VoiceInk-Dependencies
          key: whisper-xcframework-v1-${{ matrix.arch }}

      - name: Build whisper.xcframework
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/VoiceInk-Dependencies
          git clone https://github.com/ggerganov/whisper.cpp.git ~/VoiceInk-Dependencies/whisper.cpp
          cd ~/VoiceInk-Dependencies/whisper.cpp
          ./build-xcframework.sh

      # ── Build VoiceInk ──────────────────────────────────────────────────────
      - name: Resolve Swift packages
        run: |
          xcodebuild -project VoiceInk.xcodeproj -scheme VoiceInk -configuration Debug \
            -derivedDataPath "$LOCAL_DERIVED_DATA" \
            -xcconfig LocalBuild.xcconfig \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$(pwd)/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            ARCHS="${{ matrix.arch }}" \
            -resolvePackageDependencies

      - name: Patch FluidAudio package (Swift 5 mode)
        run: |
          FLUID_PKG="$LOCAL_DERIVED_DATA/SourcePackages/checkouts/FluidAudio/Package.swift"
          if [ -f "$FLUID_PKG" ] && ! grep -q 'swiftLanguageMode' "$FLUID_PKG"; then
            echo "Patching FluidAudio for Swift 5 language mode..."
            chmod u+w "$FLUID_PKG"
            python3 - "$FLUID_PKG" << 'PYEOF'
          import sys
          p = sys.argv[1]
          with open(p) as f:
              src = f.read()
          old = '"Frameworks"\n            ]'
          new = '"Frameworks"\n            ],\n            swiftSettings: [\n                .swiftLanguageMode(.v5)\n            ]'
          result = src.replace(old, new, 1)
          if result != src:
              with open(p, "w") as f:
                  f.write(result)
              print("FluidAudio patched")
          else:
              print("FluidAudio patch target not found (may have changed)")
          PYEOF
          else
            echo "FluidAudio patch not needed"
          fi

      - name: Build VoiceInk (${{ matrix.arch_name }})
        run: |
          xcodebuild -project VoiceInk.xcodeproj -scheme VoiceInk -configuration Debug \
            -derivedDataPath "$LOCAL_DERIVED_DATA" \
            -xcconfig LocalBuild.xcconfig \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$(pwd)/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            ARCHS="${{ matrix.arch }}" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            -skipPackagePluginValidation \
            build

      # ── Package DMG ─────────────────────────────────────────────────────────
      - name: Create DMG
        id: dmg
        run: |
          DMG_NAME="VoiceInk-${VERSION}-${{ matrix.arch }}.dmg"
          APP_PATH="$LOCAL_DERIVED_DATA/Build/Products/Debug/VoiceInk.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::VoiceInk.app not found at $APP_PATH"
            exit 1
          fi

          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "VoiceInk" -srcfolder "$DMG_DIR" -ov -format UDZO "$DMG_NAME"
          rm -rf "$DMG_DIR"

          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      # ── Sign with Sparkle ───────────────────────────────────────────────────
      - name: Sign DMG with Sparkle key
        id: sign
        if: env.HAS_SPARKLE_KEY == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_BIN="$LOCAL_DERIVED_DATA/SourcePackages/artifacts/sparkle/Sparkle/bin"
          if [ ! -f "$SPARKLE_BIN/sign_update" ]; then
            echo "::warning::sign_update binary not found, skipping signing"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" \
            | "$SPARKLE_BIN/sign_update" --ed-key-file - "${{ steps.dmg.outputs.dmg_name }}")

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep 'edSignature=' | sed 's/.*edSignature="\([^"]*\)".*/\1/')
          DMG_LENGTH=$(echo "$SIGN_OUTPUT" | grep 'length=' | sed 's/.*length="\([^"]*\)".*/\1/')

          echo "signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$DMG_LENGTH"      >> "$GITHUB_OUTPUT"
          echo "signed=true"             >> "$GITHUB_OUTPUT"

          cat > sign-metadata-${{ matrix.arch }}.json << EOF
          {
            "arch": "${{ matrix.arch }}",
            "signature": "$ED_SIGNATURE",
            "length": "$DMG_LENGTH",
            "dmg_name": "${{ steps.dmg.outputs.dmg_name }}"
          }
          EOF

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.dmg_name }}
          retention-days: 7

      - name: Upload sign metadata
        if: steps.sign.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sign-metadata-${{ matrix.arch }}
          path: sign-metadata-${{ matrix.arch }}.json
          retention-days: 7

  # ── Publish: push patched source to main, create release ─────────────────────
  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
      TAG: ${{ needs.prepare.outputs.tag }}
      UPSTREAM_SHA: ${{ needs.prepare.outputs.upstream_sha }}
      UPSTREAM_SHA_SHORT: ${{ needs.prepare.outputs.upstream_sha_short }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      # ── Checkout upstream and apply patches (so main shows patched source) ──
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: Beingpax/VoiceInk
          ref: main
          path: source

      - name: Checkout fork patches (supplemental Swift sources)
        uses: actions/checkout@v4
        with:
          path: fork-tools
          sparse-checkout: |
            patches

      - name: Apply patches to source
        working-directory: source
        env:
          APPCAST_LINK: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml
          SPARKLE_PUBLIC_KEY: ${{ env.SPARKLE_PUBLIC_KEY }}
        run: python3 ../fork-tools/patches/apply.py

      # ── Generate appcast.xml ────────────────────────────────────────────────
      - name: Generate appcast.xml
        working-directory: source
        run: |
          mkdir -p docs
          touch docs/.nojekyll

          META_FILE=""
          for f in ../sign-metadata-arm64/sign-metadata-arm64.json ../sign-metadata-arm64.json; do
            if [ -f "$f" ]; then META_FILE="$f"; break; fi
          done

          DOWNLOAD_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/VoiceInk-${VERSION}-arm64.dmg"
          PUB_DATE=$(date -R)

          if [ -n "$META_FILE" ]; then
            ED_SIGNATURE=$(python3 -c "import json; d=json.load(open('$META_FILE')); print(d['signature'])")
            DMG_LENGTH=$(python3 -c "import json; d=json.load(open('$META_FILE')); print(d['length'])")
          else
            ED_SIGNATURE=""
            DMG_LENGTH="0"
          fi

          cat > docs/appcast.xml << APPCAST
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/" version="2.0">
              <channel>
                  <title>VoiceInk</title>
                  <description>VoiceInk Patched Updates</description>
                  <language>en</language>
                  <item>
                      <title>Version ${TAG}</title>
                      <pubDate>${PUB_DATE}</pubDate>
                      <enclosure
                          url="${DOWNLOAD_URL}"
                          sparkle:version="${BUILD_NUMBER}"
                          sparkle:shortVersionString="${VERSION}-patched"
                          sparkle:edSignature="${ED_SIGNATURE}"
                          length="${DMG_LENGTH}"
                          type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          APPCAST

      # ── Force push patched source to main ───────────────────────────────────
      - name: Commit and force push to main
        working-directory: source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: patched v${VERSION} based on upstream ${UPSTREAM_SHA_SHORT}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

      # ── Create GitHub release ───────────────────────────────────────────────
      - name: Gather upstream release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api "repos/$UPSTREAM_REPO/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          UPSTREAM_NOTES=""
          if [ -n "$LATEST_TAG" ]; then
            UPSTREAM_NOTES=$(gh api "repos/$UPSTREAM_REPO/releases/latest" --jq '.body' 2>/dev/null || echo "")
          fi

          cat > release_notes.md << NOTESEOF
          Patched release based on [upstream/main@${UPSTREAM_SHA_SHORT}](https://github.com/${UPSTREAM_REPO}/commit/${UPSTREAM_SHA}).

          ## Downloads

          | Build | File |
          |-------|------|
          | Apple Silicon (M1/M2/M3/M4) | \`VoiceInk-${VERSION}-arm64.dmg\` |
          | Intel | \`VoiceInk-${VERSION}-x86_64.dmg\` |

          ## Fork changes
          - Trial removed — app always starts in licensed state
          - Sparkle auto-updates pointed to this fork
          NOTESEOF

          if [ -n "$UPSTREAM_NOTES" ] && [ -n "$LATEST_TAG" ]; then
            cat >> release_notes.md << NOTESEOF

          ---

          ## Upstream release notes (${LATEST_TAG})

          ${UPSTREAM_NOTES}
          NOTESEOF
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$TAG" \
            dmg-arm64/*.dmg \
            dmg-x86_64/*.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --title "VoiceInk $TAG" \
            --notes-file release_notes.md
          echo "::notice::Release created: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG"
